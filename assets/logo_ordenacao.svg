<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="100%" height="100%" style="background: transparent;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&amp;family=Bodoni+Moda:ital,opsz,wght@0,6..96,800;0,6..96,900;1,6..96,800&amp;family=Cinzel:wght@800;900&amp;display=swap');
      
      .script-shadow-dark {
        font-family: 'Alex Brush', cursive;
        font-size: 195px;
        fill: #555555;
        opacity: 0.35;
      }
      .script-shadow-gold {
        font-family: 'Alex Brush', cursive;
        font-size: 195px;
        fill: #917028;
      }
      .script-text-highlight {
        font-family: 'Alex Brush', cursive;
        font-size: 195px;
        fill: #FFF3C4;
      }
      .script-text-main {
        font-family: 'Alex Brush', cursive;
        font-size: 195px;
        fill: url(#goldGradient3D);
      }
      
      .diaconal-gold-shadow {
        font-family: 'Bodoni Moda', 'Cinzel', serif;
        font-size: 180px;
        font-weight: 900;
        letter-spacing: 0.06em;
        fill: #D4AF37;
      }
      .diaconal-black-main {
        font-family: 'Bodoni Moda', 'Cinzel', serif;
        font-size: 180px;
        font-weight: 900;
        letter-spacing: 0.06em;
        fill: #050505;
      }
    </style>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldGradient3D" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF0B9" />
      <stop offset="30%" stop-color="#DFB74A" />
      <stop offset="65%" stop-color="#B89033" />
      <stop offset="100%" stop-color="#805F19" />
    </linearGradient>

    <!-- Rule Line Gold Gradient -->
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.05" />
      <stop offset="15%" stop-color="#D4AF37" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#B89033" />
      <stop offset="85%" stop-color="#D4AF37" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <g transform="translate(0, 15)">
    <!-- 1. TALL CONDENSED "DIACONAL" WITH GOLD SHADOW -->
    <!-- Scaled horizontally to create the exact ultra-condensed serif look from the image -->
    <g transform="translate(600, 340) scale(0.66, 1.25)">
      <!-- Gold Shadow Offset -->
      <text x="8" y="6" text-anchor="middle" class="diaconal-gold-shadow">DIACONAL</text>
      <!-- Black Main Foreground -->
      <text x="0" y="0" text-anchor="middle" class="diaconal-black-main">DIACONAL</text>
    </g>

    <!-- 2. OVERLAPPING ELEGANT CURSIVE SCRIPT "Ordenação" -->
    <g transform="translate(600, 185)">
      <!-- Soft Drop Shadow -->
      <text x="3" y="4" text-anchor="middle" class="script-shadow-dark">Ordenação</text>
      <!-- Gold Depth Layer -->
      <text x="2" y="2" text-anchor="middle" class="script-shadow-gold">Ordenação</text>
      <!-- Top Highlight Edge -->
      <text x="-1" y="-1" text-anchor="middle" class="script-text-highlight">Ordenação</text>
      <!-- Main Metallic Gold Gradient Fill -->
      <text x="0" y="0" text-anchor="middle" class="script-text-main">Ordenação</text>
    </g>

    <!-- 3. BOTTOM DIVIDER RULE WITH CENTER DIAMOND & CROSS -->
    <g transform="translate(0, 465)">
      <!-- Horizontal Gold Line -->
      <line x1="80" y1="0" x2="1120" y2="0" stroke="url(#dividerGrad)" stroke-width="2.5" />

      <!-- Center Diamond Badge -->
      <g transform="translate(600, 0)">
        <!-- Outer Diamond -->
        <polygon points="0,-16 16,0 0,16 -16,0" fill="#0A0A0A" stroke="#D4AF37" stroke-width="2" />
        <!-- Inner White Latin Cross -->
        <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square" />
        <line x1="-5.5" y1="-2.5" x2="5.5" y2="-2.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="square" />
      </g>
    </g>
  </g>
</svg>
